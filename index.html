<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ณดาคลีนิค — เข้าสู่ระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background-color: #F3F4F6; color: #1F2937; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
    
    .card { background: #ffffff; width: 100%; max-width: 450px; border-radius: 1rem; padding: 2.5rem 2rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .text-center { text-align: center; }
    .title { font-size: 1.75rem; color: #7C3AED; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { color: #6B7280; font-size: 0.95rem; margin-bottom: 2rem; }
    
    .form-group { margin-bottom: 1.25rem; text-align: left; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: #374151; }
    .form-control { width: 100%; padding: 0.75rem 1rem; font-size: 1rem; border: 1px solid #D1D5DB; border-radius: 0.5rem; outline: none; transition: border-color 0.2s; font-family: inherit;}
    .form-control:focus { border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15); }
    
    .btn-login { width: 100%; background-color: #7C3AED; color: #ffffff; border: none; padding: 0.75rem; font-size: 1rem; font-weight: 600; border-radius: 0.5rem; cursor: pointer; transition: background-color 0.2s; font-family: inherit;}
    .btn-login:hover { background-color: #6D28D9; }
    .btn-login:disabled { background-color: #A78BFA; cursor: not-allowed; }

    /* หน้าเมนูหลังล็อกอิน */
    #menuSection { display: none; }
    .menu-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1.5rem; }
    .menu-card { background: #F5F3FF; border: 1px solid #DDD6FE; border-radius: 0.75rem; padding: 1.5rem; text-align: center; text-decoration: none; color: #2E1065; transition: all 0.2s; display: block; }
    .menu-card:hover { background: #EDE9FE; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .menu-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .menu-title { font-size: 1.1rem; font-weight: 600; }
    
    .btn-logout { background: transparent; border: none; color: #EF4444; font-weight: 500; cursor: pointer; text-decoration: underline; margin-top: 1.5rem; font-family: inherit;}
  </style>
</head>
<body>

  <div class="card" id="loginSection">
    <div class="text-center">
      <h1 class="title">ณดาคลีนิค</h1>
      <p class="subtitle">ระบบจัดการข้อมูลภายในคลินิก</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>Email (ที่ได้รับสิทธิ์)</label>
        <input type="email" id="loginEmail" class="form-control" required placeholder="example@gmail.com">
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="loginPass" class="form-control" required placeholder="••••••••">
      </div>
      <button type="submit" id="loginBtn" class="btn-login">เข้าสู่ระบบ</button>
    </form>
  </div>

  <div class="card" id="menuSection">
    <div class="text-center">
      <h1 class="title">เมนูหลัก</h1>
      <p class="subtitle" id="welcomeText">ยินดีต้อนรับ</p>
    </div>

    <div class="menu-grid">
      <a href="register.html" class="menu-card">
        <div class="menu-icon">📝</div>
        <div class="menu-title">ลงทะเบียนผู้ป่วยใหม่</div>
      </a>
      <a href="search.html" class="menu-card">
        <div class="menu-icon">🔍</div>
        <div class="menu-title">ค้นหาและประวัติการรักษา</div>
      </a>
    </div>

    <div class="text-center">
      <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
    </div>
  </div>

  <script>
    // URL Web App ล่าสุดของคุณ
    const ACTION_URL = "https://script.google.com/macros/s/AKfycbwbawdWUfDBBsT0mZOTKPQIiJw1y3yZq13bgOaayT-ksvldF2f3hMb7mJpK25Byah7SJw/exec";

    // เช็คว่าเคยล็อกอินไว้แล้วหรือยัง
    window.onload = function() {
      if (localStorage.getItem('nada_logged_in') === 'true') {
        showMenu(localStorage.getItem('nada_user_name'));
      }
    };

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'กำลังตรวจสอบ...';

      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value.trim();

      const params = new URLSearchParams();
      params.append('action', 'login');
      params.append('email', email);
      params.append('password', pass);

      try {
        const res = await fetch(ACTION_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: params.toString()
        });
        const result = await res.json();

        if (result.status === 'success') {
          // บันทึกสถานะการล็อกอินไว้ในเบราว์เซอร์
          localStorage.setItem('nada_logged_in', 'true');
          localStorage.setItem('nada_user_name', result.name);
          showMenu(result.name);
        } else {
          alert(result.message);
        }
      } catch (err) {
        alert('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
      } finally {
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    });

    function showMenu(name) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('menuSection').style.display = 'block';
      document.getElementById('welcomeText').textContent = 'ยินดีต้อนรับคุณ: ' + name;
    }

    function logout() {
      localStorage.removeItem('nada_logged_in');
      localStorage.removeItem('nada_user_name');
      location.reload();
    }
  </script>
</body>
</html>
